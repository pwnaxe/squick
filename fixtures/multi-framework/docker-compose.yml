services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
      - db
    networks:
      - frontend
  api:
    image: python:3.12-slim
    command: uvicorn main:app --host 0.0.0.0
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://db/app
      - REDIS_URL=redis://cache:6379
    env_file:
      - .env
    volumes:
      - ./api:/code
    depends_on:
      - db
      - cache
    networks:
      - frontend
      - backend
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
  cache:
    image: redis:7-alpine
    networks:
      - backend

volumes:
  pgdata:

networks:
  frontend:
  backend:
