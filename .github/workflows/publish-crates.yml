# Publishes the Squick library crates to crates.io in dependency order
# after a SemVer tag is pushed. Runs in parallel with `release.yml` and
# the publish-{npm,pypi}.yml workflows; there is no coupling between
# crates.io and the binary distribution channels.
#
# Dry-run mode (workflow_dispatch, dry_run=true) only verifies
# `squick-core`. The downstream crates depend on it via `version = "=1.0.0"`,
# so until that version of `squick-core` exists on crates.io they cannot
# be dry-run packaged - there is no `--offline` shortcut around this in
# stable cargo. A passing `squick-core` dry-run is a strong signal that
# the real publish will succeed for the rest of the workspace.
name: publish-crates
on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish with --dry-run (validates squick-core only)"
        required: false
        default: "false"

permissions:
  contents: read

env:
  # Newer GitHub Actions runners default to Node.js 24; opting in
  # explicitly silences the Node 20 deprecation warning emitted by
  # actions/checkout and actions/cache.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Determine publish mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "dry=true" >> "$GITHUB_OUTPUT"
            echo "Running in DRY-RUN mode (squick-core only)"
          else
            echo "dry=false" >> "$GITHUB_OUTPUT"
            echo "Running in REAL publish mode"
          fi

      # Publishes in dependency order, skipping any crate whose current
      # version is already on crates.io. Idempotent: a re-run after a
      # partial failure only publishes the crates that are still missing.
      # Dry-run mode validates squick-core only.
      - name: Publish crates
        run: |
          set -euo pipefail

          if [ "${{ steps.mode.outputs.dry }}" = "true" ]; then
            cargo publish -p squick-core --dry-run --allow-dirty
            exit 0
          fi

          publish() {
            crate="$1"
            ver=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')
            if curl -sf -H 'User-Agent: squick-ci' \
              "https://crates.io/api/v1/crates/${crate}/${ver}" >/dev/null 2>&1; then
              echo "== ${crate}@${ver} already on crates.io, skipping"
              return 0
            fi
            echo "== publishing ${crate}@${ver}"
            cargo publish -p "$crate"
            sleep 30
          }

          publish squick-core
          publish squick-dict
          publish squick-format
          publish squick-watch
          publish squick-cli
