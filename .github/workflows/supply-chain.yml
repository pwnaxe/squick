# Supply-chain checks: scan dependencies for known RUSTSEC advisories and
# publish a CycloneDX SBOM. Runs on dependency changes, on a weekly schedule
# so freshly disclosed advisories surface without a push, and on demand.
name: supply-chain
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/supply-chain.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Prebuilt binary: installing cargo-audit from source pulls the gix and
      # aws-lc-sys stack, which is slow and brittle on CI.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error
