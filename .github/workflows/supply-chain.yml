# Supply-chain checks: scan dependencies for known RUSTSEC advisories and
# publish a CycloneDX SBOM. Runs on dependency changes, on a weekly schedule
# so freshly disclosed advisories surface without a push, and on demand.
name: supply-chain
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/supply-chain.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: "**/*.cdx.json"
          if-no-files-found: error
