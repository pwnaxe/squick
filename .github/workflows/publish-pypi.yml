# Publishes the PyPI wrapper to PyPI after `dist` finishes a GitHub
# release. Builds one platform wheel per target by re-tagging a
# pure-python wheel through `wheel tags`. Each wheel bundles the
# matching squick binary plus the dictionaries directory.
name: publish-pypi
on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: build wheel (${{ matrix.platform.plat_tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { triple: x86_64-unknown-linux-gnu,  plat_tag: manylinux2014_x86_64, archive_ext: tar.xz }
          - { triple: aarch64-unknown-linux-gnu, plat_tag: manylinux2014_aarch64, archive_ext: tar.xz }
          - { triple: x86_64-apple-darwin,       plat_tag: macosx_10_12_x86_64,  archive_ext: tar.xz }
          - { triple: aarch64-apple-darwin,      plat_tag: macosx_11_0_arm64,    archive_ext: tar.xz }
          - { triple: x86_64-pc-windows-msvc,    plat_tag: win_amd64,            archive_ext: zip }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build wheel

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for release.yml to upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in $(seq 1 60); do
            if gh release view "${{ steps.tag.outputs.tag }}" \
                 --json assets --jq '.assets[].name' 2>/dev/null \
                 | grep -q 'squick-cli-${{ matrix.platform.triple }}.${{ matrix.platform.archive_ext }}'; then
              echo "Release asset ready after ${attempt} attempts"
              break
            fi
            echo "Waiting for ${{ matrix.platform.triple }} asset... attempt ${attempt}/60"
            sleep 30
          done

      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p _release
          gh release download "${{ steps.tag.outputs.tag }}" -D _release \
            -p 'squick-cli-${{ matrix.platform.triple }}.${{ matrix.platform.archive_ext }}'

      - name: Stage binary into wheel source
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          archive="_release/squick-cli-${{ matrix.platform.triple }}.${{ matrix.platform.archive_ext }}"
          if [[ "${{ matrix.platform.archive_ext }}" == "zip" ]]; then
            unzip -q "$archive" -d "$stage"
            binary_path="$(find "$stage" -name 'squick.exe' -type f | head -n1)"
          else
            tar -xf "$archive" -C "$stage"
            binary_path="$(find "$stage" -name 'squick' -type f | head -n1)"
          fi
          if [[ -z "$binary_path" ]]; then
            echo "Binary not found in archive for ${{ matrix.platform.triple }}" >&2
            ls -laR "$stage" >&2
            exit 1
          fi
          inner="$(dirname "$binary_path")"
          target="wrappers/pypi/src/squick/_binary"
          mkdir -p "$target"
          cp "$binary_path" "${target}/$(basename "$binary_path")"
          if [[ "${{ matrix.platform.triple }}" != *"windows"* ]]; then
            chmod +x "${target}/squick"
          fi
          if [[ -d "${inner}/dictionaries" ]]; then
            cp -R "${inner}/dictionaries" "${target}/dictionaries"
          else
            cp -R dictionaries "${target}/dictionaries"
          fi

      - name: Build pure-python wheel
        working-directory: wrappers/pypi
        run: python -m build --wheel

      - name: Re-tag wheel for ${{ matrix.platform.plat_tag }}
        working-directory: wrappers/pypi/dist
        run: |
          set -euo pipefail
          wheel tags --platform-tag=${{ matrix.platform.plat_tag }} \
                     --remove \
                     squick-*-py3-none-any.whl
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform.plat_tag }}
          path: wrappers/pypi/dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Uses trusted publishing (OIDC) - configure on PyPI side
          # via "Trusted Publisher Management" for the squick project.
