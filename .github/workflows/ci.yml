# Quality gate for every push and pull request: formatting, lints, and the
# test suite across Linux, macOS, and Windows. The Rust toolchain is pinned
# by rust-toolchain.toml, so rustup installs the right version automatically.
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --locked
